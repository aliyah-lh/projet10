swagger: '2.0'
info:
  title: Bank Argent API documentation
  description: Contains all available API endpoints in this codebase
  version: '2.0.0'
  termsOfService: 'http://swagger.io/terms/'
host: localhost:3001
basePath: /api/v1
schemes:
  - http
paths:
  # =============================================
  # ENDPOINTS UTILISATEUR (Phase 1 - existants)
  # =============================================
  /user/login:
    post:
      tags:
        - User Module
      summary: Login
      description: API for Login
      parameters:
        - in: body
          name: body
          description: Login Payload
          required: true
          schema:
            $ref: '#/definitions/Login'
      produces:
        - application/json
      responses:
        '200':
          description: Login Successfully
          schema:
            $ref: '#/definitions/LoginResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/signup:
    post:
      tags:
        - User Module
      summary: Signup
      description: API for Signup
      parameters:
        - in: body
          name: body
          description: Signup Payload
          required: true
          schema:
            $ref: '#/definitions/User'
      produces:
        - application/json
      responses:
        '200':
          description: Signup Successfully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/profile:
    get:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for fetching a user profile
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for updating a user profile
      parameters:
        - in: body
          name: body
          description: Update user profile attributes
          required: true
          schema:
            $ref: '#/definitions/UserProfile'
      produces:
        - application/json
      responses:
        '200':
          description: User profile retrieved successully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error

  # =============================================
  # ENDPOINTS TRANSACTIONS (Phase 2 - nouveaux)
  # =============================================

  # --- Endpoint pour recuperer les comptes de l'utilisateur ---
  /user/accounts:
    get:
      security:
        - Bearer: []
      tags:
        - Accounts Module
      summary: Get all user accounts
      description: Returns all bank accounts for the authenticated user
      produces:
        - application/json
      responses:
        '200':
          description: Accounts retrieved successfully
          schema:
            $ref: '#/definitions/AccountsResponse'
        '401':
          description: Unauthorized - invalid or missing token
        '500':
          description: Internal Server Error

  # --- Endpoint pour recuperer les transactions d'un compte ---
  /user/accounts/{accountId}/transactions:
    get:
      security:
        - Bearer: []
      tags:
        - Transactions Module
      summary: Get all transactions for an account
      description: Returns all transactions for a specific account for the current month
      parameters:
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: query
          name: month
          description: Month to filter transactions (format YYYY-MM). Defaults to current month if not provided
          required: false
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Transactions retrieved successfully
          schema:
            $ref: '#/definitions/TransactionsResponse'
        '401':
          description: Unauthorized - invalid or missing token
        '404':
          description: Account not found
        '500':
          description: Internal Server Error

  # --- Endpoint pour recuperer le detail d'une transaction ---
  /user/accounts/{accountId}/transactions/{transactionId}:
    get:
      security:
        - Bearer: []
      tags:
        - Transactions Module
      summary: Get a specific transaction
      description: Returns the details of a specific transaction
      parameters:
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: path
          name: transactionId
          description: ID of the transaction
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Transaction retrieved successfully
          schema:
            $ref: '#/definitions/TransactionDetailResponse'
        '401':
          description: Unauthorized - invalid or missing token
        '404':
          description: Transaction not found
        '500':
          description: Internal Server Error

  # --- Endpoint pour modifier la categorie d'une transaction ---
  /user/accounts/{accountId}/transactions/{transactionId}/category:
    patch:
      security:
        - Bearer: []
      tags:
        - Transactions Module
      summary: Update a transaction category
      description: Add or modify the category of a specific transaction
      parameters:
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: path
          name: transactionId
          description: ID of the transaction
          required: true
          type: string
        - in: body
          name: body
          description: Category payload
          required: true
          schema:
            $ref: '#/definitions/TransactionCategory'
      produces:
        - application/json
      responses:
        '200':
          description: Category updated successfully
          schema:
            $ref: '#/definitions/TransactionDetailResponse'
        '400':
          description: Invalid Fields
        '401':
          description: Unauthorized - invalid or missing token
        '404':
          description: Transaction not found
        '500':
          description: Internal Server Error

  # --- Endpoint pour modifier ou supprimer la note d'une transaction ---
  /user/accounts/{accountId}/transactions/{transactionId}/note:
    patch:
      security:
        - Bearer: []
      tags:
        - Transactions Module
      summary: Update a transaction note
      description: Add or modify the note of a specific transaction
      parameters:
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: path
          name: transactionId
          description: ID of the transaction
          required: true
          type: string
        - in: body
          name: body
          description: Note payload
          required: true
          schema:
            $ref: '#/definitions/TransactionNote'
      produces:
        - application/json
      responses:
        '200':
          description: Note updated successfully
          schema:
            $ref: '#/definitions/TransactionDetailResponse'
        '400':
          description: Invalid Fields
        '401':
          description: Unauthorized - invalid or missing token
        '404':
          description: Transaction not found
        '500':
          description: Internal Server Error
    delete:
      security:
        - Bearer: []
      tags:
        - Transactions Module
      summary: Delete a transaction note
      description: Remove the note from a specific transaction
      parameters:
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: path
          name: transactionId
          description: ID of the transaction
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Note deleted successfully
          schema:
            $ref: '#/definitions/TransactionDetailResponse'
        '401':
          description: Unauthorized - invalid or missing token
        '404':
          description: Transaction not found
        '500':
          description: Internal Server Error

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header

definitions:
  User:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
      firstName:
        type: string
        description: user first name
      lastName:
        type: string
        description: user last name
      userName:
        type: string
        description: user public name
  Login:
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
  ApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string
  LoginResponse:
    type: object
    properties:
      token:
        type: string
  UserProfile:
    type: object
    properties:
      userName:
        type: string

  # =============================================
  # DEFINITIONS TRANSACTIONS (nouvelles)
  # =============================================

  # --- Definition d'un compte bancaire ---
  Account:
    type: object
    properties:
      id:
        type: string
        description: account unique ID
      title:
        type: string
        description: account title (ex. Argent Bank Checking x8349)
      amount:
        type: number
        description: current account balance
      description:
        type: string
        description: balance description (ex. Available Balance)

  # --- Reponse contenant la liste des comptes ---
  AccountsResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          $ref: '#/definitions/Account'

  # --- Definition d'une transaction (vue liste) ---
  Transaction:
    type: object
    properties:
      id:
        type: string
        description: transaction unique ID
      date:
        type: string
        format: date
        description: transaction date
      description:
        type: string
        description: transaction description (ex. Golden Sun Bakery)
      amount:
        type: number
        description: transaction amount
      balance:
        type: number
        description: account balance after this transaction

  # --- Definition d'une transaction (vue detail) ---
  TransactionDetail:
    type: object
    properties:
      id:
        type: string
        description: transaction unique ID
      date:
        type: string
        format: date
        description: transaction date
      description:
        type: string
        description: transaction description (ex. Golden Sun Bakery)
      amount:
        type: number
        description: transaction amount
      balance:
        type: number
        description: account balance after this transaction
      transactionType:
        type: string
        description: type of transaction (ex. Electronic)
      category:
        type: string
        description: transaction category (ex. Food)
      note:
        type: string
        description: user note on this transaction

  # --- Reponse contenant la liste des transactions ---
  TransactionsResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          $ref: '#/definitions/Transaction'

  # --- Reponse contenant le detail d'une transaction ---
  TransactionDetailResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        $ref: '#/definitions/TransactionDetail'

  # --- Payload pour modifier la categorie ---
  TransactionCategory:
    type: object
    properties:
      category:
        type: string
        description: new category for the transaction (ex. Food, Transport, Health)

  # --- Payload pour modifier la note ---
  TransactionNote:
    type: object
    properties:
      note:
        type: string
        description: user note for the transaction
